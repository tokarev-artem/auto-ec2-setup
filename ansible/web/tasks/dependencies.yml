- name: install deps
  apt:
    name: 
    - git
    - htop
    - ncdu
    - dstat
    - software-properties-common
    - net-tools
    - zip
    state: present
    update_cache: true
    
- name: Install certbot
  snap:
    name: certbot
    classic: true

- name: Set file permissions recursively
  file:
    path: /var/www/vhosts/
    owner: www-data
    group: www-data
    mode: "u=rwX,g=rwX,o=rX"
    recurse: yes
    state: directory

- name: Assert supported architecture
  assert:
    that:
      - ansible_architecture in ['x86_64', 'aarch64']
    fail_msg: >-
      Unsupported architecture '{{ ansible_architecture }}'.
      Supported values are: 'x86_64' and 'aarch64'.

- name: Set AWS CLI architecture string
  set_fact:
    aws_cli_arch: "{{ 'x86_64' if ansible_architecture == 'x86_64' else 'aarch64' }}"

- name: Download AWS CLI v2
  get_url:
    url: "https://awscli.amazonaws.com/awscli-exe-linux-{{ aws_cli_arch }}.zip"
    dest: "/tmp/awscliv2.zip"

- name: Unzip AWS CLI v2
  unarchive:
    src: "/tmp/awscliv2.zip"
    dest: "/tmp/"
    remote_src: yes

- name: Install AWS CLI v2
  command: "/tmp/aws/install"

- name: Verify AWS CLI installation
  command: "aws --version"
  register: aws_cli_version

- name: Show AWS CLI version
  debug:
    msg: "{{ aws_cli_version.stdout }}"
