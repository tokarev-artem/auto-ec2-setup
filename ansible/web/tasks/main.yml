- name: set passwords
  set_fact:
    root_pass: "{{ lookup('password', '/dev/null length=15 chars=ascii_letters,digits!@#$%^*()-=+_') }}"

- name: set defaults
  set_fact:
    web_framework: "{{ web_framework | default('php', true) }}"
    install_mysql: "{{ install_mysql | default(true, true) }}"
    nodejs_version: "{{ nodejs_version | default('20', true) }}"

- include_tasks: dependencies.yml

- include_tasks: php.yml
  when: web_framework == "php"

- include_tasks: nodejs.yml
  when: web_framework == "nodejs"

- include_tasks: nginx.yml

- include_tasks: mysql.yml
  when: install_mysql | bool
