---
- name: Installing MySQL and dependencies
  package:
    name: "{{ item }}"
    state: present
    update_cache: yes
  loop:
    - mysql-server
    - mysql-client
    - python3-pymysql
    - python3-cryptography
    - libmysqlclient-dev

- name: Start and enable MySQL service
  service:
    name: mysql
    state: started
    enabled: yes

- name: Set MySQL root password
  ansible.mysql.mysql_user:
    login_host: localhost
    login_user: root
    login_password: ''
    login_unix_socket: /var/run/mysqld/mysqld.sock
    name: root
    plugin: caching_sha2_password
    plugin_auth_string: "{{ root_pass }}"
    state: present

- name: Create /root/.my.cnf for subsequent tasks
  template:
    src: my.cnf
    dest: /root/.my.cnf
    owner: root
    group: root
    mode: '0600'

- name: Generate backup user password
  set_fact:
    backup_pass: "{{ lookup('password', '/dev/null length=20 chars=ascii_letters,digits') }}"
  no_log: true

- name: Create backup user with read-only dump privileges on all databases
  ansible.mysql.mysql_user:
    name: backup
    plugin: caching_sha2_password
    plugin_auth_string: "{{ backup_pass }}"
    priv: "*.*:SELECT,LOCK TABLES,SHOW VIEW,EVENT,TRIGGER,RELOAD,PROCESS"
    state: present
  no_log: true

- name: Create databases
  ansible.mysql.mysql_db:
    name: "{{ item.name }}"
    state: present
  loop: "{{ mysql_databases }}"
  loop_control:
    label: "{{ item.name }}"

- name: Generate database user passwords
  set_fact:
    db_user_passwords: >-
      {{ db_user_passwords | default({}) | combine({
           item.user: lookup('password', '/dev/null length=20 chars=ascii_letters,digits')
         }) }}
  loop: "{{ mysql_databases }}"
  loop_control:
    label: "{{ item.user }}"
  no_log: true

- name: Create database users
  ansible.mysql.mysql_user:
    name: "{{ item.user }}"
    plugin: caching_sha2_password
    plugin_auth_string: "{{ db_user_passwords[item.user] }}"
    priv: "{{ item.name }}.*:ALL,GRANT"
    state: present
  loop: "{{ mysql_databases }}"
  loop_control:
    label: "{{ item.user }}@{{ item.name }}"
  no_log: true

- name: Ensure vhost directory exists for credentials file
  file:
    path: "/var/www/vhosts/{{ item.name }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop: "{{ mysql_databases }}"
  loop_control:
    label: "{{ item.name }}"

- name: Write database credentials to vhost directory
  copy:
    dest: "/var/www/vhosts/{{ item.name }}/.db_credentials"
    content: |
      DB_NAME={{ item.name }}
      DB_USER={{ item.user }}
      DB_PASSWORD={{ db_user_passwords[item.user] }}
    owner: root
    group: root
    mode: '0640'
  loop: "{{ mysql_databases }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

- name: Deploy db.php file
  template:
    src: db.php.j2
    dest: /var/www/vhosts/{{ domain_name }}/index.php
    owner: www-data
    group: www-data
    mode: '0644'

- name: Create a directory for backup script
  file:
    path: /root/bin/
    owner: root
    group: root
    state: directory

- name: Create mysql backup job
  template:
    src: mysql-maint.sh
    dest: /root/bin/mysql-maint.sh
    owner: root
    group: root
    mode: '0750'

- name: Schedule the backup
  cron:
    name: mysql backup
    minute: "0"
    hour: "0"
    user: root
    job: "/root/bin/mysql-maint.sh -b >> /var/log/backup.log"
