---
# mysql_databases is passed as a JSON string from --extra-vars; parse it once into a fact.
- name: Parse mysql_databases JSON
  set_fact:
    _mysql_databases: "{{ mysql_databases | from_json if mysql_databases is string else mysql_databases }}"

- name: Installing MySQL and dependencies
  package:
    name: "{{ item }}"
    state: present
    update_cache: yes
  loop:
    - mysql-server
    - mysql-client
    - python3-pymysql
    - libmysqlclient-dev

- name: Start and enable MySQL service
  service:
    name: mysql
    state: started
    enabled: yes

- name: Set MySQL root password
  ansible.mysql.mysql_user:
    login_host: localhost
    login_user: root
    login_password: ''
    login_unix_socket: /var/run/mysqld/mysqld.sock
    name: root
    password: "{{ root_pass }}"
    state: present

- name: Create /root/.my.cnf for subsequent tasks
  template:
    src: my.cnf
    dest: /root/.my.cnf
    owner: root
    group: root
    mode: '0600'

- name: Generate backup user password
  set_fact:
    backup_pass: "{{ lookup('password', '/dev/null length=20 chars=ascii_letters,digits') }}"
  no_log: true

- name: Create backup user with read-only dump privileges on all databases
  ansible.mysql.mysql_user:
    name: "backup"
    password: "{{ backup_pass }}"
    priv: "*.*:SELECT,LOCK TABLES,SHOW VIEW,EVENT,TRIGGER,RELOAD,PROCESS"
    state: present
  no_log: true

- name: Create databases
  ansible.mysql.mysql_db:
    name: "{{ item.name }}"
    state: present
  loop: "{{ _mysql_databases }}"
  loop_control:
    label: "{{ item.name }}"

- name: Create database users
  ansible.mysql.mysql_user:
    name: "{{ item.user }}"
    # Use provided password or generate a random one if empty/omitted
    password: >-
      {{ item.password if (item.password is defined and item.password | length > 0)
         else lookup('password', '/dev/null length=20 chars=ascii_letters,digits') }}
    priv: "{{ item.name }}.*:ALL,GRANT"
    state: present
  loop: "{{ _mysql_databases }}"
  loop_control:
    label: "{{ item.user }}@{{ item.name }}"
  no_log: true

- name: Create a directory for backup script
  file:
    path: /root/bin/
    owner: root
    group: root
    state: directory

- name: Create mysql backup job
  template:
    src: mysql-maint.sh
    dest: /root/bin/mysql-maint.sh
    owner: root
    group: root
    mode: '0750'

- name: Schedule the backup
  cron:
    name: mysql backup
    minute: "0"
    hour: "0"
    user: root
    job: "/root/bin/mysql-maint.sh -b >> /var/log/backup.log"
