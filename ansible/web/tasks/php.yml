- name: Gather facts
  setup:
    gather_subset: min
  when: ansible_facts['distribution_version'] is not defined

- name: Set PHP package prefix
  set_fact:
    php_pkg_prefix: "{{ '' if ansible_facts['distribution_version'] == '26.04' else 'php' + (php_version | default('')) + '-' }}"
    php_base_pkg:   "{{ 'php' if ansible_facts['distribution_version'] == '26.04' else 'php' + (php_version | default('')) }}"

- name: Add ondrej/php PPA repository
  deb822_repository:
    name: ondrej-php
    types: deb
    uris: https://ppa.launchpadcontent.net/ondrej/php/ubuntu
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: main
    signed_by: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x4F4EA0AAE5267A6C
    state: present
  when: ansible_facts['distribution_version'] != "26.04"

- name: Build PHP package list
  set_fact:
    php_packages:
      - "{{ php_base_pkg }}"
      - "{{ php_pkg_prefix }}cli"
      - "{{ php_pkg_prefix }}fpm"
      - "{{ php_pkg_prefix }}common"
      - "{{ php_pkg_prefix }}gd"
      - "{{ php_pkg_prefix }}xml"
      - "{{ php_pkg_prefix }}odbc"
      - "{{ php_pkg_prefix }}dba"
      - "{{ php_pkg_prefix }}soap"
      - "{{ php_pkg_prefix }}mysql"
      - "{{ php_pkg_prefix }}mbstring"
      - "{{ php_pkg_prefix }}xmlrpc"
      - "{{ php_pkg_prefix }}bcmath"
      - "{{ php_pkg_prefix }}curl"
      - "{{ php_pkg_prefix }}zip"
      - composer

- name: Add opcache package
  set_fact:
    php_packages: "{{ php_packages + [php_pkg_prefix ~ 'opcache'] }}"
  when: php_version != '8.5'

- name: PHP | Install modules
  apt:
    name: "{{ php_packages }}"
    state: present
    update_cache: yes

- name: Define php.ini configuration
  set_fact:
    php_ini_config:
      PHP:
        file_uploads: "On"
        allow_url_fopen: "On"
        allow_url_include: "Off"
        short_open_tag: "Off"
        expose_php: "Off"
        display_errors: "Off"
        display_startup_errors: "Off"
        log_errors: "On"
        ignore_repeated_errors: "Off"
        error_log: "/var/log/php{{ php_version }}-fpm.log"
        post_max_size: "100M"
        upload_max_filesize: "100M"
        cgi.force_redirect: "Off"
        disable_functions: "passthru,system,curl_multi_exec,parse_ini_file,show_source,shell_exec,exec"

- name: PHP | Configure php.ini
  ini_file:
    path: "/etc/php/{{ php_version }}/fpm/php.ini"
    section: "{{ item.0.key }}"
    option: "{{ item.1.key }}"
    value: "{{ item.1.value }}"
  loop: "{{ php_ini_config | dict2items | subelements('value') }}"
  notify: Restart php-fpm
