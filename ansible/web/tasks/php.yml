- name: Gather facts
  setup:
    gather_subset: min
  when: ansible_facts['distribution_version'] is not defined

- name: Set PHP package prefix
  set_fact:
    php_pkg_prefix: "{{ '' if ansible_facts['distribution_version'] == '26.04' else 'php' + php_version + '-' }}"
    php_base_pkg:   "{{ 'php' if ansible_facts['distribution_version'] == '26.04' else 'php' + php_version }}"

- name: Add ondrej/php PPA repository
  deb822_repository:
    name: ondrej-php
    types: deb
    uris: https://ppa.launchpadcontent.net/ondrej/php/ubuntu
    suites: "{{ ansible_facts['distribution_release'] }}"
    components: main
    signed_by: https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x4F4EA0AAE5267A6C
    state: present
  when: ansible_facts['distribution_version'] != "26.04"

- name: PHP | Install modules
  apt:
    name:
      - "{{ php_base_pkg }}"
      - "{{ php_pkg_prefix }}cli"
      - "{{ php_pkg_prefix }}fpm"
      - "{{ php_pkg_prefix }}common"
      - "{{ php_pkg_prefix }}gd"
      - "{{ php_pkg_prefix }}xml"
      - "{{ php_pkg_prefix }}odbc"
      - "{{ php_pkg_prefix }}dba"
      - "{{ php_pkg_prefix }}soap"
      - "{{ php_pkg_prefix }}mysql"
      - "{{ php_pkg_prefix }}mbstring"
      - "{{ php_pkg_prefix }}xmlrpc"
      - "{{ php_pkg_prefix }}opcache"
      - "{{ php_pkg_prefix }}bcmath"
      - "{{ php_pkg_prefix }}curl"
      - "{{ php_pkg_prefix }}zip"
      - composer
    state: present
    update_cache: yes

- name: PHP | Configure php.ini
  ini_file:
    dest: "/etc/php/{{ php_version }}/fpm/php.ini"
    section: "PHP"
    option: "{{ item.option }}"
    value: "{{ item.value }}"
  loop:
    - { option: file_uploads,            value: "On" }
    - { option: allow_url_fopen,         value: "On" }
    - { option: allow_url_include,       value: "Off" }
    - { option: short_open_tag,          value: "On" }
    - { option: expose_php,              value: "Off" }
    - { option: display_errors,          value: "Off" }
    - { option: display_startup_errors,  value: "Off" }
    - { option: log_errors,              value: "On" }
    - { option: ignore_repeated_errors,  value: "Off" }
    - { option: error_log,               value: "/var/log/php{{ php_version }}-fpm.log" }
    - { option: post_max_size,           value: "100M" }
    - { option: upload_max_filesize,     value: "100M" }
    - { option: cgi.force_redirect,      value: "Off" }
    - { option: disable_functions,       value: "passthru,system,curl_multi_exec,parse_ini_file,show_source,shell_exec,exec" }
  notify: Restart php-fpm

- name: PHP | Enable and start PHP-FPM
  service:
    name: "php{{ php_version }}-fpm.service"
    state: started
    enabled: yes